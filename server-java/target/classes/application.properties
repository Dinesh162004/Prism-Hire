# ============================
# PrismHire Backend Config
# ============================

# Server
server.port=5000

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/prismhire?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Multipart (resume uploads)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
app.jwt.secret=super_secret_key_123_padded_to_256bits_for_security
app.jwt.expiration=3600000

# Gemini AI API Key (replace with your actual key)
gemini.api.key=RANDOM_GEMINI_KEY_8F32C9E1B7A6D4

# File upload temp directory
upload.temp.dir=${java.io.tmpdir}

# Logging
logging.level.com.prismhire=INFO
logging.level.org.springframework.security=WARN
